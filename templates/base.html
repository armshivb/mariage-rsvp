<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ couple }} – Mariage</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400;700&family=Great+Vibes&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <!-- Écran de chargement -->
  <div id="loading-screen">
    <div class="loading-content">
      <p class="loading-quote">Kévin & Lucie</p>
      <p class="loading-sub">arrivent… ne quittez pas 💍</p>
      <div class="loading-dots"><span></span><span></span><span></span></div>
    </div>
  </div>

  <script>
    window.addEventListener('load', function() {
      document.getElementById('loading-screen').style.opacity = '0';
      setTimeout(function() {
        document.getElementById('loading-screen').style.display = 'none';
      }, 600);
    });
  </script>
  <header>
    <h1 class="couple-name">{{ couple }}</h1>
    <p class="wedding-quote">On se dit enfin oui</p>
    <p class="wedding-info">{{ date }}</p>
    <img class="header-photo" src="/static/kevin_lucie.jpg" alt="Kévin & Lucie" />
  </header>
  <main class="{% block main_class %}{% endblock %}">
    {% block content %}{% endblock %}
  </main>
  <footer>
    <p>Avec tout notre amour 💍</p>
  </footer>
</body>
</html>
