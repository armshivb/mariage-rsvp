{% extends "base.html" %}
{% block content %}
<div class="card">
  <h2>Vous êtes invité·e !</h2>
  <p class="subtitle">Entrez le code présent sur votre invitation pour confirmer votre présence.</p>

  {% if error %}
  <div class="alert-error">{{ error }}</div>
  {% endif %}

  <form method="post" action="/">
    <div class="field">
      <label for="code">Votre code d'invitation</label>
      <input
        type="text"
        id="code"
        name="code"
        placeholder="Ex : A1B2C3"
        autocomplete="off"
        autocapitalize="characters"
        maxlength="6"
        required
      />
    </div>
    <button type="submit" class="btn-primary">Accéder à mon invitation →</button>
  </form>
</div>
{% endblock %}
