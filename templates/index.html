{% extends "base.html" %}
{% block content %}
<div class="card">
  <h2>Vous êtes invité·e !</h2>
  <p class="subtitle">Entrez votre <strong>prénom et nom</strong> ou votre <strong>numéro de téléphone</strong> pour accéder à votre invitation.</p>

  {% if error %}
  <div class="alert-error">{{ error }}</div>
  {% endif %}

  <form method="post" action="/">
    <div class="field">
      <label for="recherche">Prénom Nom ou numéro de téléphone</label>
      <input
        type="text"
        id="recherche"
        name="recherche"
        placeholder="Ex : Marie Dupont ou 0612345678"
        autocomplete="off"
        required
      />
    </div>
    <button type="submit" class="btn-primary">Accéder à mon invitation →</button>
  </form>
</div>
{% endblock %}
